name: Generate Animation

on:
  # Berjalan otomatis setiap 24 jam sekali
  schedule:
    - cron: "0 */24 * * *"
  
  # Memungkinkan kita menjalankan manual lewat tombol di tab Actions
  workflow_dispatch:
  
  # Berjalan otomatis setiap ada push baru di branch main
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a snake game from a github user contributions graph
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Alimurtadlo16
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Push hasil animasi ular ke branch khusus bernama 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
